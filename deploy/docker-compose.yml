services:
  backend:
    build:
      # 构建上下文为项目根目录 (相对于 deploy 文件夹的上级)
      context: ..
      dockerfile: deploy/backend.Dockerfile
    container_name: market-backend
    volumes:
      # 🔴 关键：将宿主机 data 目录挂载进容器，确保容器重建不丢失数据
      # 此路径相对于 deploy/ 目录，即项目根目录下的 data/
      - ../data:/app/data
    environment:
      # 数据库路径
      - DB_PATH=/app/data/market_data.db
      - USER_DB_PATH=/app/data/user_data.db
      # 时区
      - TZ=Asia/Shanghai
      # LLM 配置 (从宿主机环境变量透传，需在服务器上配置)
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gpt-3.5-turbo}
      - LLM_PROXY=${LLM_PROXY:-}
      - INGEST_TOKEN=${INGEST_TOKEN}
      - WRITE_API_TOKEN=${WRITE_API_TOKEN}
      - ENABLE_CLOUD_COLLECTOR=${ENABLE_CLOUD_COLLECTOR:-false}
    restart: always

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        - VITE_WRITE_API_TOKEN=${WRITE_API_TOKEN}
    container_name: market-frontend
    ports:
      # 映射 80 端口到宿主机
      - "80:80"
    depends_on:
      - backend
    restart: always
